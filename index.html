<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gamefy - Editor de Escenarios</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importamos Three.js desde un CDN (sin necesidad de instalar nada aún) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="toolbar">
        <div class="tool-group">
            <h4>Modo</h4>
            <select id="drawing-mode">
                <option value="2d">2D (Plano)</option>
                <option value="3d">3D (Volumen)</option>
            </select>
        </div>
        
        <div class="tool-group">
            <h4>Herramientas 2D</h4>
            <button id="btn-rect2d">📐 Rectángulo (2D)</button>
            <button id="btn-circle2d">⭕ Círculo (2D)</button>
            <button id="btn-line">📏 Línea</button>
            <button id="btn-freehand">✏️ Mano alzada</button>
        </div>

        <div class="tool-group">
            <h4>Herramientas 3D</h4>
            <button id="btn-cube">🧊 Cubo</button>
            <button id="btn-sphere">⚪ Esfera</button>
            <button id="btn-cylinder">🥫 Cilindro</button>
        </div>

        <div class="controls">
            <label>Color: <input type="color" id="color-picker" value="#ff0000"></label>
        </div>

        <div class="tool-group">
            <h4>Edición</h4>
            <button id="btn-select">🖱️ Seleccionar</button>
            <button id="btn-undo">↩️ Deshacer</button>
            <button id="btn-redo">↪️ Rehacer</button>
            <button id="btn-clear">🗑️ Limpiar</button>
            <button id="btn-save">💾 Guardar</button>
        </div>

        <div class="tool-group">
            <h4>Grid</h4>
            <button id="btn-grid-config">📏 Configurar Grid</button>
        </div>

    </div>


    <div id="canvas-container">
        <!-- El canvas se genera automáticamente por Three.js, pero lo reservamos aquí -->
    </div>

    <div id="properties-panel">
        <h3>Propiedades</h3>
        <p>Selecciona un objeto para ver sus datos.</p>
        <div id="obj-info">Area de edicion fina</div>
    </div>

    <!-- Cargamos nuestros scripts como módulos -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
